# ABI source of truth — the kernel capture contract and the persisted event
# schema, in one file. `go generate ./internal/abi/` compiles this into Go:
#   - tracepoints_gen.go              (CollectorTracepoints)
#   - schema_gen.go                   (SchemaVersion, SchemaDoc)
#   - ../storage/schema_gen.go        (DDL + column lists)
# Never hand-edit those outputs.

tracepoints:
  - group: sched
    event: sched_process_fork
    program: trace_sched_process_fork
    optional: false
