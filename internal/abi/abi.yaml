# ---- persisted SQLite event schema ----
schema:
  version: 1
  table: events
  table_doc: one row per collected event

  columns:
    - name: id
      type: INTEGER PRIMARY KEY AUTOINCREMENT
      insert: false
      doc: row id, insertion order
    - name: ts
      type: INTEGER NOT NULL
      doc: unix nanoseconds; format with datetime(ts/1e9,'unixepoch')
    - name: category
      type: TEXT NOT NULL DEFAULT ''
      doc: process | file | network | memory | block
    - name: action
      type: TEXT NOT NULL DEFAULT ''
      doc: exec, exit, fork, clone, open, read, write, rename, unlink, bind, connect, listen, ...
    - name: pid
      type: INTEGER NOT NULL DEFAULT 0
      doc: process id
    - name: ppid
      type: INTEGER NOT NULL DEFAULT 0
      doc: parent process id
    - name: uid
      type: INTEGER NOT NULL DEFAULT 0
      doc: user id
    - name: comm
      type: TEXT NOT NULL DEFAULT ''
      doc: process name
    - name: exe
      type: TEXT NOT NULL DEFAULT ''
      doc: resolved executable path
    - name: container_id
      type: TEXT NOT NULL DEFAULT ''
      doc: container id
    - name: cgroup_path
      type: TEXT NOT NULL DEFAULT ''
      doc: cgroup path
    - name: path
      type: TEXT NOT NULL DEFAULT ''
      doc: file path
    - name: old_path
      type: TEXT NOT NULL DEFAULT ''
      doc: rename source path
    - name: local_addr
      type: TEXT NOT NULL DEFAULT ''
      doc: local address
    - name: local_port
      type: INTEGER NOT NULL DEFAULT 0
      doc: local port
    - name: remote_addr
      type: TEXT NOT NULL DEFAULT ''
      doc: remote address
    - name: remote_port
      type: INTEGER NOT NULL DEFAULT 0
      doc: remote port
    - name: remote_host
      type: TEXT NOT NULL DEFAULT ''
      doc: resolved remote hostname
    - name: target_pid
      type: INTEGER NOT NULL DEFAULT 0
      doc: signal/ptrace target pid
    - name: exit_code
      type: INTEGER NOT NULL DEFAULT 0
      doc: process exit code
    - name: dropped_before
      type: INTEGER NOT NULL DEFAULT 0
      doc: events lost immediately before this row
    - name: metadata
      type: TEXT NOT NULL DEFAULT '{}'
      doc: JSON object; query with json_extract(metadata, '$.key')
    - name: raw
      type: TEXT NOT NULL DEFAULT '{}'
      doc: JSON object; raw source event

  indexes:
    - name: idx_events_ts
      columns: [ts]
    - name: idx_events_pid_ts
      columns: [pid, ts]
    - name: idx_events_path
      columns: [path]
    - name: idx_events_cat_action_ts
      columns: [category, action, ts]

# ---- kernel->userspace transport ABI ----
# The byte-for-byte layout the eBPF program writes and userspace decodes. It is
# generated into internal/abi/kernel_event.gen.h (C), which collector.bpf.c
# includes; the Go side (collectorEvent) is in turn generated by bpf2go from the
# compiled object's BTF. So this is the single source for the wire format.
# `type` is the C type verbatim; `count` (a constant name or integer) makes the
# field a fixed array. Field order defines the on-wire byte order.
kernel_event:
  struct: ltm_kernel_event
  constants:
    - name: LTM_PATH_MAX_LEN
      value: 128
    - name: LTM_COMM_LEN
      value: 16
    - name: LTM_LABEL_LEN
      value: 16
  fields:
    - {name: ts_ns, type: __u64}
    - {name: bytes, type: __u64}
    - {name: pid, type: __u32}
    - {name: uid, type: __u32}
    - {name: local_port, type: __u16}
    - {name: remote_port, type: __u16}
    - {name: local_ip4, type: __u32}
    - {name: remote_ip4, type: __u32}
    - {name: comm, type: char, count: LTM_COMM_LEN}
    - {name: category, type: char, count: LTM_LABEL_LEN}
    - {name: action, type: char, count: LTM_LABEL_LEN}
    - {name: path, type: char, count: LTM_PATH_MAX_LEN}
    - {name: old_path, type: char, count: LTM_PATH_MAX_LEN}
    - {name: syscall_nr, type: __u32}
    - {name: fd, type: __s32}
    - {name: aux, type: __u32}
