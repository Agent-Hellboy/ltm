name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  test:
    name: test (ubuntu)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true
      - name: Verify generated ABI files are up to date
        run: |
          make generate
          git diff --exit-code -- internal/abi internal/storage/schema_gen.go
      - name: Run unit tests
        run: go test ./...
      - name: Cross-compile non-Linux build (stub collector path)
        run: GOOS=darwin CGO_ENABLED=0 go build ./...

  integration:
    name: integration (ubuntu)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true
      - name: Run eBPF integration flow
        run: bash tests/integration.sh

  linux-build:
    name: linux build with ebpf
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true
      - name: Install BPF build tools
        run: sudo apt-get update && sudo apt-get install -y clang llvm
      - name: Verify generated eBPF artifacts are up to date
        run: make ebpf
      - name: Check generated eBPF artifacts for drift
        run: git diff --exit-code -- internal/abi internal/ebpf internal/storage/schema_gen.go
      - name: Build Linux binary
        run: go build -o bin/ltm ./cmd/ltm
      - name: Verify embedded object is present
        run: test -s internal/ebpf/collector_bpfel.o
