name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  test:
    name: test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true
      - name: Run unit tests
        run: go test ./...

  integration:
    name: integration (ubuntu)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true
      - name: Run demo integration flow
        run: bash tests/integration.sh

  linux-build:
    name: linux build with ebpf
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true
      - name: Install BPF build tools
        run: sudo apt-get update && sudo apt-get install -y clang llvm
      - name: Rebuild eBPF object
        run: make ebpf
      - name: Build Linux binary
        run: go build -o bin/ltm ./cmd/ltm
      - name: Verify embedded object is present
        run: test -s ebpf/collector_bpfel.o
